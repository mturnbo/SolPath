      <g fill="#061b33"><circle cx="256" cy="177" r="2.5"/><circle cx="280" cy="187" r="2.5"/><circle cx="288" cy="211" r="2.5"/><circle cx="280" cy="235" r="2.5"/><circle cx="256" cy="245" r="2.5"/><circle cx="232" cy="235" r="2.5"/><circle cx="224" cy="211" r="2.5"/><circle cx="232" cy="187" r="2.5"/></g>

