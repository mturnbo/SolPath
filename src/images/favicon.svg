      <path d="M397 381h10l3-12 3 12h10l-8 6 3 11-8-7-8 7 3-11z"/>
      <path d="M103 347h9l3-11 3 11h9l-7 5 3 10-8-6-8 6 3-10z"/>
      <path d="M369 254h9l3-11 3 11h9l-7 5 3 10-8-6-8 6 3-10z"/>
