      <circle cx="327" cy="457" r="3"/><circle cx="225" cy="466" r="2.5"/><circle cx="116" cy="422" r="3"/>
      <circle cx="54" cy="329" r="2.5"/><circle cx="75" cy="229" r="3"/><circle cx="211" cy="177" r="2.5"/>
