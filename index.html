<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolPath</title>
  <link rel="stylesheet" href="src/css/reset.css" />
  <link rel="stylesheet" href="src/css/main.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>SolPath</h1>
      <p class="tagline">Constant-thrust trajectory planner for the inner and outer solar system</p>
    </header>

    <main id="main">
      <section id="canvas-container">
        <canvas id="solar-system"></canvas>
      </section>

      <aside id="control-panel">

        <section class="panel-section" id="section-date">
          <h2 class="panel-heading">Departure Date</h2>

          <div class="date-input-row">
            <input type="date" id="date-input" />
            <button class="btn-ghost" id="date-today" title="Jump to today">Today</button>
          </div>

          <div class="date-step-row">
            <button class="btn-step" id="step-prev-year"  title="−1 year">−Y</button>
            <button class="btn-step" id="step-prev-month" title="−1 month">−M</button>
            <button class="btn-step" id="step-prev-day"   title="−1 day">−D</button>
            <button class="btn-step" id="step-next-day"   title="+1 day">+D</button>
            <button class="btn-step" id="step-next-month" title="+1 month">+M</button>
            <button class="btn-step" id="step-next-year"  title="+1 year">+Y</button>
          </div>
        </section>

        <section class="panel-section panel-section--muted" id="section-mission">
          <p class="placeholder">Mission controls coming in a future PR.</p>
        </section>

      </aside>
    </main>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
