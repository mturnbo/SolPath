<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolPath</title>
  <link rel="stylesheet" href="src/css/reset.css" />
  <link rel="stylesheet" href="src/css/main.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>SolPath</h1>
      <p class="tagline">Constant-thrust trajectory planner for the inner and outer solar system</p>
    </header>

    <main id="main">
      <section id="canvas-container">
        <canvas id="solar-system"></canvas>
        <div id="zoom-controls">
          <button class="btn-zoom" id="btn-zoom-in"  title="Zoom in">+</button>
          <button class="btn-zoom" id="btn-zoom-out" title="Zoom out">−</button>
          <button class="btn-zoom" id="btn-zoom-fit" title="Fit solar system">⊡</button>
        </div>
      </section>

      <aside id="control-panel">

        <section class="panel-section" id="section-mission">
          <h2 class="panel-heading">Mission Planner</h2>

          <div class="field-row">
            <label class="field-label" for="select-origin">From</label>
            <select class="field-select" id="select-origin"></select>
          </div>

          <div class="field-row">
            <label class="field-label" for="select-dest">To</label>
            <select class="field-select" id="select-dest"></select>
          </div>

          <div class="field-row field-row--col">
            <div class="field-row-top">
              <label class="field-label" for="slider-accel">Acceleration</label>
              <span class="field-value" id="label-accel">1.0 g</span>
            </div>
            <input type="range" class="field-range" id="slider-accel"
                   min="0.01" max="2" step="0.01" value="1" />
            <div class="field-range-labels">
              <span>0.01 g</span><span class="field-range-label--comfort">≤ 1.2 g comfortable</span><span>2 g</span>
            </div>
          </div>

          <div class="field-row">
            <label class="field-label" for="select-detour-mode">Detour</label>
            <select class="field-select" id="select-detour-mode"
                    title="How to handle paths that pass within 0.35 AU of the Sun">
              <option value="stop">Waypoint stop</option>
              <option value="arc">Smooth arc</option>
            </select>
          </div>
        </section>

        <section class="panel-section" id="section-date">
          <h2 class="panel-heading">Departure Date</h2>

          <div class="date-input-row">
            <input type="date" id="date-input" />
            <button class="btn-ghost" id="date-today" title="Jump to today">Today</button>
          </div>

          <div class="date-step-row">
            <button class="btn-step" id="step-prev-year"  title="−1 year">−Y</button>
            <button class="btn-step" id="step-prev-month" title="−1 month">−M</button>
            <button class="btn-step" id="step-prev-day"   title="−1 day">−D</button>
            <button class="btn-step" id="step-next-day"   title="+1 day">+D</button>
            <button class="btn-step" id="step-next-month" title="+1 month">+M</button>
            <button class="btn-step" id="step-next-year"  title="+1 year">+Y</button>
          </div>
        </section>

        <section class="panel-section" id="section-compare">
          <h2 class="panel-heading">Compare Accelerations</h2>
          <div class="compare-header">
            <button class="btn-ghost" id="btn-compare-toggle">Enable</button>
          </div>
          <div id="compare-options" class="compare-options"></div>
        </section>

        <section class="panel-section" id="section-animation">
          <h2 class="panel-heading">Animation</h2>
          <div class="anim-controls">
            <button class="btn-anim" id="btn-anim-play"  title="Play">&#9654;</button>
            <button class="btn-anim" id="btn-anim-pause" title="Pause">&#9646;&#9646;</button>
            <button class="btn-anim" id="btn-anim-reset" title="Reset">&#8635;</button>
            <span class="anim-elapsed" id="anim-elapsed">T + 0</span>
          </div>
        </section>

        <section class="panel-section" id="section-info">
          <h2 class="panel-heading">Mission Summary</h2>
          <div id="mission-info-panel">
            <p class="info-empty">Configure a mission above.</p>
          </div>
        </section>

        <section class="panel-section" id="section-relativity">
          <h2 class="panel-heading">Time Dilation</h2>
          <div id="relativity-panel">
            <p class="info-empty">Select a destination to see time dilation.</p>
          </div>
        </section>

      </aside>
    </main>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
